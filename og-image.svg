<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c6ef7"/>
      <stop offset="100%" stop-color="#00c9a7"/>
    </linearGradient>
    <radialGradient id="orb1" cx="0" cy="0.5" r="0.7" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#7c6ef7" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#7c6ef7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="1" cy="0.5" r="0.6" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#00c9a7" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#00c9a7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#070709"/>

  <!-- Ambient orbs -->
  <ellipse cx="0" cy="315" rx="560" ry="560" fill="url(#orb1)" filter="url(#blur)"/>
  <ellipse cx="1200" cy="315" rx="480" ry="480" fill="url(#orb2)" filter="url(#blur)"/>

  <!-- Top gradient bar -->
  <rect width="1200" height="3" fill="url(#grad)"/>

  <!-- Dot grid pattern (subtle) -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#7c6ef7" fill-opacity="0.12"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Left content block -->
  <!-- MR. logo -->
  <text x="80" y="128" font-family="'Segoe UI', system-ui, sans-serif" font-size="40" font-weight="700" letter-spacing="-1" fill="#ededf4">MR<tspan fill="#7c6ef7">.</tspan></text>

  <!-- Open to work badge -->
  <rect x="80" y="155" width="160" height="30" rx="15" fill="rgba(34,197,94,0.10)" stroke="rgba(34,197,94,0.28)" stroke-width="1"/>
  <circle cx="104" cy="170" r="5" fill="#22c55e"/>
  <text x="116" y="175" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="600" fill="#22c55e" letter-spacing="0.02em">Open to Work</text>

  <!-- Name -->
  <text x="80" y="305" font-family="'Segoe UI', system-ui, sans-serif" font-size="72" font-weight="700" fill="#ededf4" letter-spacing="-2">Mohamed Rayyan</text>

  <!-- Role -->
  <text x="80" y="362" font-family="'Segoe UI', system-ui, sans-serif" font-size="28" font-weight="400" fill="#7878a0">CS Student &amp; Web Developer · Maldives</text>

  <!-- Divider -->
  <rect x="80" y="398" width="72" height="3" rx="2" fill="url(#grad)"/>

  <!-- Skill pills row -->
  <!-- HTML/CSS -->
  <rect x="80" y="420" width="108" height="34" rx="17" fill="rgba(124,110,247,0.12)" stroke="#7c6ef7" stroke-width="1" stroke-opacity="0.3"/>
  <text x="134" y="442" font-family="'Segoe UI', system-ui, sans-serif" font-size="15" font-weight="600" fill="#7c6ef7" text-anchor="middle">HTML / CSS</text>

  <!-- JavaScript -->
  <rect x="200" y="420" width="122" height="34" rx="17" fill="rgba(124,110,247,0.12)" stroke="#7c6ef7" stroke-width="1" stroke-opacity="0.3"/>
  <text x="261" y="442" font-family="'Segoe UI', system-ui, sans-serif" font-size="15" font-weight="600" fill="#7c6ef7" text-anchor="middle">JavaScript</text>

  <!-- Python -->
  <rect x="334" y="420" width="96" height="34" rx="17" fill="rgba(124,110,247,0.12)" stroke="#7c6ef7" stroke-width="1" stroke-opacity="0.3"/>
  <text x="382" y="442" font-family="'Segoe UI', system-ui, sans-serif" font-size="15" font-weight="600" fill="#7c6ef7" text-anchor="middle">Python</text>

  <!-- Node.js -->
  <rect x="442" y="420" width="94" height="34" rx="17" fill="rgba(0,201,167,0.10)" stroke="#00c9a7" stroke-width="1" stroke-opacity="0.35"/>
  <text x="489" y="442" font-family="'Segoe UI', system-ui, sans-serif" font-size="15" font-weight="600" fill="#00c9a7" text-anchor="middle">Node.js</text>

  <!-- Laravel -->
  <rect x="548" y="420" width="94" height="34" rx="17" fill="rgba(0,201,167,0.10)" stroke="#00c9a7" stroke-width="1" stroke-opacity="0.35"/>
  <text x="595" y="442" font-family="'Segoe UI', system-ui, sans-serif" font-size="15" font-weight="600" fill="#00c9a7" text-anchor="middle">Laravel</text>

  <!-- Domain -->
  <text x="80" y="572" font-family="'Segoe UI', system-ui, sans-serif" font-size="19" fill="#3d3d55" letter-spacing="0.02em">rayyaann.dev</text>

  <!-- Right side: large decorative initials -->
  <text x="1060" y="400" font-family="'Segoe UI', system-ui, sans-serif" font-size="260" font-weight="700" fill="rgba(124,110,247,0.06)" text-anchor="middle" letter-spacing="-8">MR</text>
</svg>
